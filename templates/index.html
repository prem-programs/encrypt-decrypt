<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Encoder</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="card">
        <span class="switch">
            <a href="{{ url_for('decoder') }}"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24"
                    height="24" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M20.9451 13C20.9814 12.6717 21 12.338 21 12C21 7.02944 16.9706 3 12 3C9.17273 3 6.64996 4.30367 5 6.34267M3.05493 11C3.01863 11.3283 3 11.662 3 12C3 16.9706 7.02944 21 12 21C14.8273 21 17.35 19.6963 19 17.6573" />
                    <path d="M8 7H7C5.58579 7 4.87868 7 4.43934 6.56066C4 6.12132 4 5.41421 4 4V3" />
                    <path d="M16 17H17C18.4142 17 19.1213 17 19.5607 17.4393C20 17.8787 20 18.5858 20 20V21" />
                </svg>Decrypt</a>
        </span>
        <h1>Message Encrypter</h1>

        <form method="POST" action="{{url_for('index')}}">
            <label for="message">Enter your message</label>
            <input id="message" name="message" type="text" placeholder="Paste your message here" required>
            <button type="submit">Encrypt</button>
        </form>

        <div class="output">
            {% if name %}
            <strong>Encrypted Message:<br></strong>
            <button id="copy"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15"
                    color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M7 11V9C7 5.70017 7 4.05025 8.02513 3.02513C9.05025 2 10.7002 2 14 2C17.2998 2 18.9497 2 19.9749 3.02513C21 4.05025 21 5.70017 21 9V11C21 14.2998 21 15.9497 19.9749 16.9749C18.9497 18 17.2998 18 14 18C10.7002 18 9.05025 18 8.02513 16.9749C7 15.9497 7 14.2998 7 11Z" />
                    <path d="M3 6V15C3 18.2998 3 19.9497 4.02513 20.9749C5.05025 22 6.70017 22 10 22H17" />
                </svg></button>
                <span id="copiedBtn"></span>
            <p>{{ name }}</p>
            {% endif %}
        </div>
    </div>

    <script>
        const btn = document.getElementById("copy")
        const content = document.querySelector("p").textContent
        const Copied = document.getElementById("copiedBtn")
        btn.addEventListener("click",()=>{
            navigator.clipboard.writeText(content)
            Copied.innerText = "Copied!"
            setTimeout(() => {
                Copied.innerText=""; 
            }, 1000);
        })
    </script>
</body>

</html>
